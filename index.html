<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎬 Compresor de Video</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #1a1a2e;
      border: 1px solid #2e2e50;
      border-radius: 16px;
      padding: 40px;
      max-width: 560px;
      width: 100%;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 6px;
      color: #a78bfa;
    }

    p.subtitle {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 28px;
    }

    .drop-zone {
      border: 2px dashed #4a4a80;
      border-radius: 12px;
      padding: 36px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 24px;
    }

    .drop-zone:hover, .drop-zone.active {
      border-color: #a78bfa;
      background: rgba(167,139,250,0.05);
    }

    .drop-zone input { display: none; }
    .drop-zone .icon { font-size: 2.5rem; margin-bottom: 10px; }
    .drop-zone p { color: #aaa; font-size: 0.9rem; }
    .drop-zone span { color: #a78bfa; font-weight: 600; cursor: pointer; }

    label.setting {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      font-size: 0.9rem;
      color: #ccc;
    }

    select, input[type="range"] {
      background: #12122a;
      border: 1px solid #3a3a60;
      color: #e0e0f0;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 0.85rem;
      outline: none;
    }

    input[type="range"] {
      width: 160px;
      accent-color: #a78bfa;
      padding: 0;
    }

    .crf-value {
      color: #a78bfa;
      font-weight: 700;
      min-width: 28px;
      text-align: right;
    }

    button#compressBtn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #7c3aed, #a78bfa);
      color: white;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 8px;
    }

    button#compressBtn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    button#compressBtn:disabled { opacity: 0.5; cursor: not-allowed; }

    .progress-wrap {
      margin-top: 20px;
      display: none;
    }

    .progress-bar-bg {
      background: #12122a;
      border-radius: 99px;
      height: 10px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #7c3aed, #a78bfa);
      border-radius: 99px;
      width: 0%;
      transition: width 0.3s;
    }

    .progress-label {
      font-size: 0.82rem;
      color: #888;
      text-align: center;
    }

    .result {
      margin-top: 20px;
      padding: 16px;
      background: #12122a;
      border-radius: 10px;
      display: none;
      text-align: center;
    }

    .result p { font-size: 0.88rem; color: #aaa; margin-bottom: 12px; }
    .result strong { color: #a78bfa; }

    .result a {
      display: inline-block;
      padding: 10px 24px;
      background: #7c3aed;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      transition: opacity 0.2s;
    }

    .result a:hover { opacity: 0.85; }

    .file-info {
      font-size: 0.82rem;
      color: #a78bfa;
      text-align: center;
      margin-top: -12px;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>🎬 Compresor de Video</h1>
  <p class="subtitle">Reduce el peso de tu video directo en el navegador. Sin servidores, sin uploads.</p>

  <div class="drop-zone" id="dropZone">
    <div class="icon">📁</div>
    <p>Arrastra tu video aquí o <span onclick="document.getElementById('fileInput').click()">selecciona un archivo</span></p>
    <p style="margin-top:6px; font-size:0.78rem; color:#555;">MP4, MOV, AVI, MKV, WEBM</p>
    <input type="file" id="fileInput" accept="video/*" />
  </div>

  <div class="file-info" id="fileInfo"></div>

  <label class="setting">
    <span>🎯 Calidad (CRF)</span>
    <div style="display:flex; align-items:center; gap:10px;">
      <input type="range" id="crfSlider" min="18" max="35" value="24" />
      <span class="crf-value" id="crfVal">24</span>
    </div>
  </label>

  <label class="setting">
    <span>📐 Resolución</span>
    <select id="resolution">
      <option value="original">Original</option>
      <option value="1280x720">720p</option>
      <option value="854x480">480p</option>
      <option value="640x360">360p</option>
    </select>
  </label>

  <label class="setting">
    <span>🎵 Audio</span>
    <select id="audio">
      <option value="128k">128 kbps (normal)</option>
      <option value="96k">96 kbps (ligero)</option>
      <option value="64k">64 kbps (mínimo)</option>
      <option value="none">Sin audio</option>
    </select>
  </label>

  <button id="compressBtn" disabled>Comprimir Video</button>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar-bg">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <p class="progress-label" id="progressLabel">Iniciando FFmpeg...</p>
  </div>

  <div class="result" id="result"></div>
</div>

<script type="module">
  import { FFmpeg } from 'https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/esm/index.js';
  import { fetchFile } from 'https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/dist/esm/index.js';

  const ffmpeg = new FFmpeg();
  let selectedFile = null;

  const dropZone      = document.getElementById('dropZone');
  const fileInput     = document.getElementById('fileInput');
  const fileInfo      = document.getElementById('fileInfo');
  const crfSlider     = document.getElementById('crfSlider');
  const crfVal        = document.getElementById('crfVal');
  const compressBtn   = document.getElementById('compressBtn');
  const progressWrap  = document.getElementById('progressWrap');
  const progressBar   = document.getElementById('progressBar');
  const progressLabel = document.getElementById('progressLabel');
  const resultDiv     = document.getElementById('result');

  crfSlider.addEventListener('input', () => { crfVal.textContent = crfSlider.value; });

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('active'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('active'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('active');
    handleFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', () => handleFile(fileInput.files[0]));

  function handleFile(file) {
    if (!file || !file.type.startsWith('video/')) return;
    selectedFile = file;
    const mb = (file.size / 1024 / 1024).toFixed(2);
    fileInfo.textContent = `📂 ${file.name} — ${mb} MB`;
    fileInfo.style.display = 'block';
    compressBtn.disabled = false;
    resultDiv.style.display = 'none';
  }

  async function loadFFmpeg() {
    progressLabel.textContent = 'Descargando FFmpeg (primera vez ~10s)...';
    await ffmpeg.load({
      coreURL: 'https://cdn.jsdelivr.net/npm/@ffmpeg/core-st@0.12.6/dist/esm/ffmpeg-core.js',
      wasmURL: 'https://cdn.jsdelivr.net/npm/@ffmpeg/core-st@0.12.6/dist/esm/ffmpeg-core.wasm',
    });
  }

  ffmpeg.on('progress', ({ progress }) => {
    const pct = Math.min(Math.round(progress * 100), 100);
    progressBar.style.width = pct + '%';
    progressLabel.textContent = `Comprimiendo... ${pct}%`;
  });

  compressBtn.addEventListener('click', async () => {
    if (!selectedFile) return;

    compressBtn.disabled = true;
    progressWrap.style.display = 'block';
    progressBar.style.width = '0%';
    progressLabel.textContent = 'Iniciando...';
    resultDiv.style.display = 'none';

    try {
      if (!ffmpeg.loaded) await loadFFmpeg();

      progressLabel.textContent = 'Leyendo archivo...';
      const ext        = selectedFile.name.split('.').pop();
      const inputName  = `input.${ext}`;
      const outputName = 'output.mp4';

      await ffmpeg.writeFile(inputName, await fetchFile(selectedFile));

      const crf       = crfSlider.value;
      const res       = document.getElementById('resolution').value;
      const audioMode = document.getElementById('audio').value;

      const args = ['-i', inputName, '-c:v', 'libx264', '-crf', crf, '-preset', 'fast'];

      if (res !== 'original') args.push('-vf', `scale=${res}`);

      if (audioMode === 'none') {
        args.push('-an');
      } else {
        args.push('-c:a', 'aac', '-b:a', audioMode);
      }

      args.push('-movflags', '+faststart', outputName);

      progressLabel.textContent = 'Comprimiendo...';
      await ffmpeg.exec(args);

      const data   = await ffmpeg.readFile(outputName);
      const blob   = new Blob([data.buffer], { type: 'video/mp4' });
      const url    = URL.createObjectURL(blob);
      const origMB = (selectedFile.size / 1024 / 1024).toFixed(2);
      const newMB  = (blob.size / 1024 / 1024).toFixed(2);
      const saving = (((selectedFile.size - blob.size) / selectedFile.size) * 100).toFixed(1);

      progressBar.style.width = '100%';
      progressLabel.textContent = '✅ ¡Listo!';

      resultDiv.innerHTML = `
        <p>Original: <strong>${origMB} MB</strong> → Comprimido: <strong>${newMB} MB</strong> &nbsp;|&nbsp; Ahorro: <strong>${saving}%</strong></p>
        <a href="${url}" download="video_comprimido.mp4">⬇️ Descargar Video</a>
      `;
      resultDiv.style.display = 'block';

    } catch (err) {
      progressLabel.textContent = '❌ Error: ' + err.message;
      console.error(err);
    }

    compressBtn.disabled = false;
  });
</script>

</body>
</html>
